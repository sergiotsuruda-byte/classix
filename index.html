<!DOCTYPE html>
<html>
<head>

<title>ClassiX Brasil</title>
<meta charset="UTF-8">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#0a58ff;
color:white;
padding:25px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.search{
margin:60px auto;
width:600px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
}

input,select{
width:90%;
padding:12px;
margin:10px;
font-size:16px;
}

button{
background:#0a58ff;
color:white;
border:none;
padding:14px 30px;
font-size:18px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#083ec2;
}

</style>

</head>

<body>

<header>
ClassiX Brasil
</header>

<div class="search">

<h2>Encontre seu imóvel</h2>

<select>
<option>Tipo de imóvel</option>
<option>Casa</option>
<option>Apartamento</option>
<option>Terreno</option>
<option>Comercial</option>
</select>

<input placeholder="Cidade">

<input placeholder="Bairro">

<button>Buscar</button>

</div>

</body>

</html>
